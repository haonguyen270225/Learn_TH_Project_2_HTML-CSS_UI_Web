<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB DEMO HTML/CSS : Bella Olonje !</title>
    <!-- font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/CSS/reset.css" />
    <link rel="stylesheet" href="./assets/CSS/style.css" />
  </head>
  <body style="height: 10000px">
    <!-- header -->
    <header class="header fixed">
      <div class="main-content">
        <div class="body">
          <!-- logo -->
          <img
            src="./assets/img/logo_Bella_Olonje.svg"
            alt="Logo Bella Olonje"
            class="logo"
          />
          <!-- navigation -->
          <div class="nav">
            <ul>
              <li>
                <a href="#!" class="active">Home</a>
              </li>
              <li>
                <a href="#!">Product</a>
              </li>
              <li>
                <a href="#!">Faq</a>
              </li>
              <li>
                <a href="#!">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>
    <main>
      <!-- hero 1 -->
      <div class="hero-1">
        <div class="main-content">
          <div class="info">
            <h3 class="head-lv3">Food app</h3>
            <h1 class="head">
              Why stay hungry when you can order form Bella Onojie
            </h1>
            <p class="desc">Download the bella onoje’s food app now on</p>
            <div class="action">
              <button class="btn btn-playstore">Playstore</button>
              <button class="btn btn-appstore">App store</button>
            </div>
          </div>
        </div>
      </div>
      <!-- mobile content -->
      <div class="mobile-content">
        <div class="main-content">
          <div class="mobile-item">
            <img src="./assets/img/mobile-item1.png" alt="" class="item1" />
            <img src="./assets/img/mobile-item2.png" alt="" class="item2" />
            <hr />
            <p class="desc">How the app works</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
